<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<div class="auth-page">
  <div class="glass-container">
    <div class="auth-brand">
      <div class="logo-wrapper">🍔</div>
      <h1>Join the Family</h1>
      <p>Create an account to enjoy our premium cafeteria services</p>
    </div>

    <div class="auth-card">
      <div class="form-header">
        <h2>Create Account</h2>
        <div class="divider"></div>
      </div>

      <div class="input-grid">
        <div class="input-group">
          <label>Username</label>
          <div class="input-field">
            <span class="icon">👤</span>
            <input type="text" [(ngModel)]="username" placeholder="e.g. aminsaleh" />
          </div>
        </div>

        <div class="input-group">
          <label>Email Address</label>
          <div class="input-field">
            <span class="icon">📧</span>
            <input type="email" [(ngModel)]="email" placeholder="e.g. name@example.com" />
          </div>
        </div>

        <div class="input-group">
          <label>Mobile Number</label>
          <div class="input-field">
            <span class="icon">📱</span>
            <input type="text" [(ngModel)]="mobile" placeholder="e.g. 01012345678" />
          </div>
        </div>

        <div class="input-group">
          <label>Password</label>
          <div class="input-field">
            <span class="icon">🔒</span>
            <input type="password" [(ngModel)]="password" placeholder="Min. 8 characters" />
          </div>
        </div>
      </div>

      <button class="submit-btn" (click)='register()'>
        <span>Create Account</span>
        <span class="arrow">→</span>
      </button>

      <div class="error-box" *ngIf="error">
        <span class="error-icon">⚠️</span> {{ error }}
      </div>

      <div class="auth-footer">
        <p>Already have an account? <a (click)="goToLogin()">Login here</a></p>
      </div>
    </div>
  </div>
</div>
