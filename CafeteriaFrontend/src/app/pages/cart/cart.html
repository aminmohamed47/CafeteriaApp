<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

<div class="cart-container">
  <div class="header">
    <button class="back-btn" (click)="goBack()">← Back to Menu</button>
    <h1>🛒 Your Cart</h1>
  </div>

  <div class="cart-content" *ngIf="cart.length > 0; else emptyCart">
    <div class="cart-items">
      <div class="cart-card" *ngFor="let entry of cart">
        <div class="item-details">
          <h3>{{ entry.item.name }}</h3>
          <p class="price">{{ entry.item.price }} EGP</p>
        </div>
        <div class="item-actions">
          <div class="quantity-controls">
            <button (click)="updateQuantity(entry.item, -1)">-</button>
            <span>{{ entry.quantity }}</span>
            <button (click)="updateQuantity(entry.item, 1)">+</button>
          </div>
          <p class="subtotal">{{ entry.item.price * entry.quantity }} EGP</p>
          <button class="remove-btn" (click)="removeItem(entry.item)">🗑️</button>
        </div>
      </div>
    </div>

    <div class="order-summary">
      <h2>Order Summary</h2>
      <div class="summary-row">
        <span>Items Total</span>
        <span>{{ getTotalPrice() }} EGP</span>
      </div>
      <div class="summary-row">
        <span>Delivery Fee</span>
        <span class="free">FREE</span>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span>{{ getTotalPrice() }} EGP</span>
      </div>
      <button class="checkout-btn" [disabled]="isPlacingOrder" (click)="placeOrder()">
        {{ isPlacingOrder ? 'Processing...' : 'Place Order' }}
      </button>
    </div>
  </div>

  <ng-template #emptyCart>
    <div class="empty-state">
      <div class="empty-icon">🛒</div>
      <h2>Your cart is empty</h2>
      <p>Looks like you haven't added anything yet.</p>
      <button class="back-btn-large" (click)="goBack()">Explore Menu</button>
    </div>
  </ng-template>
</div>
