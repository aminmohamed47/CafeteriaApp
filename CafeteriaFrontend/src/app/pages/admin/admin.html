<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

<div class="admin-container">
  <div class="sidebar">
    <div class="logo">🍔 Admin</div>
    <nav>
      <button [class.active]="activeTab === 'orders'" (click)="activeTab = 'orders'">Orders</button>
      <button [class.active]="activeTab === 'menu'" (click)="activeTab = 'menu'">Menu</button>
    </nav>
    <button class="exit-btn" (click)="goBack()">Exit</button>
  </div>

  <main class="content">
    <!-- Orders Tab -->
    <div *ngIf="activeTab === 'orders'" class="tab-content">
      <div class="section-header">
        <h1>Current Orders Management</h1>
      </div>
      <div class="orders-grid">
        <div class="loading-spinner" *ngIf="isOrdersLoading">
          <div class="spinner"></div>
          <p>Loading current orders...</p>
        </div>

        <ng-container *ngIf="!isOrdersLoading">
          <div class="order-card" *ngFor="let order of orders">
            <div class="order-info">
              <span class="order-num">Order #{{ order.id }}</span>
              <span class="user">{{ order.userName }}</span>
              <span class="status" [ngClass]="order.status.toLowerCase()">{{ order.status }}</span>
            </div>
            <div class="order-items">
              <div class="item" *ngFor="let item of order.items">
                {{ item.quantity }}x {{ item.itemName }}
              </div>
            </div>
            <div class="order-actions">
              <button class="status-btn preparing" (click)="updateOrderStatus(order.id, 'Preparing')">Prepare</button>
              <button class="status-btn ready" (click)="updateOrderStatus(order.id, 'Ready')">Ready</button>
              <button class="status-btn delivered" (click)="updateOrderStatus(order.id, 'Delivered')">Deliver</button>
            </div>
          </div>
        </ng-container>
      </div>
    </div>

    <!-- Menu Tab -->
    <div *ngIf="activeTab === 'menu'" class="tab-content">
      <div class="section-header">
        <h1>Menu Management</h1>
      </div>

      <div class="admin-grid">
        <!-- Add/Edit Form -->
        <div class="form-card">
          <h2>{{ isEditing ? 'Edit Existing Item' : 'Add New Item' }}</h2>
          <div class="form-group">
            <label>Name</label>
            <input type="text" [(ngModel)]="newItem.name" placeholder="Item name" />
          </div>
          <div class="form-group">
            <label>Category</label>
            <select [(ngModel)]="newItem.categoryId">
              <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
            </select>
          </div>
          <div class="form-group">
            <label>Price (EGP)</label>
            <input type="number" [(ngModel)]="newItem.price" />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea [(ngModel)]="newItem.description"></textarea>
          </div>
          <div class="form-group">
            <label>Image URL</label>
            <input type="text" [(ngModel)]="newItem.imageUrl" placeholder="Image URL" />
          </div>
          <div class="form-actions">
            <button class="save-btn" (click)="saveMenuItem()">{{ isEditing ? 'Update Item' : 'Add to Menu' }}</button>
            <button class="cancel-btn" *ngIf="isEditing" (click)="resetForm()">Cancel</button>
          </div>
        </div>

        <!-- Items List -->
        <div class="items-list">
          <div class="item-card" *ngFor="let item of menuItems">
            <img [src]="item.imageUrl" [alt]="item.name" />
            <div class="item-info">
              <h3>{{ item.name }}</h3>
              <p>{{ item.price }} EGP</p>
            </div>
            <div class="item-actions">
              <button class="edit-btn" (click)="editItem(item)">✏️</button>
              <button class="del-btn" (click)="deleteItem(item.id)">✖</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
